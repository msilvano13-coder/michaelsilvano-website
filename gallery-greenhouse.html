<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katie & Rocco — Greenhouse Garden Estate | Michael Silvano Photography</title>
  <meta name="description" content="A greenhouse wedding filled with wildflowers and warm light. Wedding photography by Michael Silvano.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ivory: #faf8f5;
      --green: #2a3d28;
      --peach: #d4956b;
      --dark: #1a1a1a;
      --text: #4a4a4a;
      --text-light: #7a7a7a;
      --white: #ffffff;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Montserrat', sans-serif;
      color: var(--dark); background: var(--white);
      line-height: 1.8; font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    .gallery-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
    }
    .gallery-nav .back-link {
      font-size: 0.7rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text);
      transition: color 0.3s;
    }
    .gallery-nav .back-link:hover { color: var(--peach); }
    .gallery-nav .nav-brand img {
      height: 35px; width: auto; mix-blend-mode: multiply;
    }

    .gallery-hero {
      padding: 10rem 3rem 5rem;
      text-align: center; background: var(--white);
    }
    .gallery-hero .eyebrow {
      font-size: 0.6rem; letter-spacing: 6px;
      text-transform: uppercase; color: var(--peach);
      margin-bottom: 1rem;
    }
    .gallery-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 400; font-style: italic;
      color: var(--dark); margin-bottom: 1rem;
    }
    .gallery-hero .venue {
      font-size: 0.7rem; letter-spacing: 3px;
      text-transform: uppercase; color: var(--text-light);
      margin-bottom: 1.5rem;
    }
    .gallery-hero .description {
      font-size: 0.95rem; color: var(--text);
      max-width: 600px; margin: 0 auto;
      line-height: 2; font-style: italic;
    }

    .gallery-masonry {
      column-count: 3; column-gap: 8px;
      padding: 0 3rem 5rem;
      max-width: 1400px; margin: 0 auto;
    }
    .gallery-masonry img {
      width: 100%; margin-bottom: 8px;
      break-inside: avoid;
    }

    .gallery-footer {
      text-align: center; padding: 4rem 2rem;
      background: var(--ivory);
    }
    .gallery-footer p {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-style: italic;
      color: var(--dark); margin-bottom: 1.5rem;
    }
    .gallery-footer a {
      display: inline-block; padding: 0.8rem 2.5rem;
      border: 1px solid var(--peach); color: var(--peach);
      font-size: 0.65rem; letter-spacing: 3px;
      text-transform: uppercase; transition: all 0.3s;
    }
    .gallery-footer a:hover { background: var(--peach); color: var(--white); }

    @media (max-width: 768px) {
      .gallery-masonry { column-count: 2; padding: 0 1rem 3rem; }
      .gallery-nav { padding: 1rem 1.5rem; }
      .gallery-hero { padding: 8rem 1.5rem 3rem; }
    }
    @media (max-width: 480px) {
      .gallery-masonry { column-count: 1; }
    }
    .gallery-masonry .img-wrap { position: relative; break-inside: avoid; margin-bottom: 8px; }
    .gallery-masonry .img-wrap img { margin-bottom: 0; }
    .pin-btn {
      position: absolute; top: 8px; right: 8px; z-index: 5;
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s;
      cursor: pointer; border: none; padding: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .pin-btn svg { width: 14px; height: 14px; fill: #333; }
    .img-wrap:hover .pin-btn { opacity: 1; }
    .pin-btn:hover { background: #fff; }
  </style>
</head>
<body>
  <nav class="gallery-nav">
    <a href="index.html" class="back-link">&larr; Back to Home</a>
    <a href="index.html" class="nav-brand"><img src="images/MS-Monogram-Dark.jpg" alt="MS"></a>
  </nav>

  <div class="gallery-hero">
    <p class="eyebrow">Featured Wedding</p>
    <h1>Katie & Rocco</h1>
    <p class="venue">Greenhouse Garden Estate</p>
    <p class="description">An afternoon of wildflowers and warm light — surrounded by glass walls and towering green, Katie and Rocco celebrated with an ease that felt like it had always been there.</p>
  </div>

  <div class="gallery-masonry">
    <img src="images/portfolio/000062790009.jpg" alt="Greenhouse ceremony setup" loading="lazy">
    <img src="images/portfolio/000062850012.jpg" alt="Wedding dress hanging" loading="lazy">
    <img src="images/portfolio/OL9A2817.jpg" alt="Invitation flat lay" loading="lazy">
    <img src="images/portfolio/098A4735.jpg" alt="Bridal shoes" loading="lazy">
    <img src="images/portfolio/000062840012.jpg" alt="Bride laughing" loading="lazy">
    <img src="images/portfolio/000062830029.jpg" alt="Ceremony under tree" loading="lazy">
    <img src="images/portfolio/000062860011.jpg" alt="Bouquet details" loading="lazy">
    <img src="images/portfolio/000062790006.jpg" alt="Greenhouse portraits" loading="lazy">
    <img src="images/portfolio/000062820035.jpg" alt="Ceremony moment" loading="lazy">
    <img src="images/portfolio/1901018691-R1-007.jpg" alt="Champagne tower" loading="lazy">
  </div>

  <div class="gallery-footer">
    <p>Interested in working together?</p>
    <a href="index.html#contact">Get in Touch</a>
  </div>
  <script>
    document.querySelectorAll('.gallery-masonry > img').forEach(function(img) {
      var wrap = document.createElement('div');
      wrap.className = 'img-wrap';
      img.parentNode.insertBefore(wrap, img);
      wrap.appendChild(img);

      var btn = document.createElement('button');
      btn.className = 'pin-btn';
      btn.title = 'Save to Pinterest';
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>';
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var url = encodeURIComponent(window.location.href);
        var media = encodeURIComponent(img.src.startsWith('http') ? img.src : window.location.origin + '/' + img.src);
        var desc = encodeURIComponent(img.alt + ' | Michael Silvano Photography | Boston Wedding Photographer');
        window.open('https://pinterest.com/pin/create/button/?url=' + url + '&media=' + media + '&description=' + desc, '_blank', 'width=750,height=550');
      });
      wrap.appendChild(btn);
    });
  </script>
</body>
</html>
