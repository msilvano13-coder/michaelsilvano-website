    .gallery-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 400; font-style: italic; color: var(--dark); margin-bottom: 1rem; }
    .gallery-hero .venue { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text-light); margin-bottom: 1.5rem; }
    .gallery-hero .description { font-size: 0.95rem; color: var(--text); max-width: 600px; margin: 0 auto; line-height: 2; font-style: italic; }
    .gallery-masonry { column-count: 3; column-gap: 8px; padding: 0 3rem 5rem; max-width: 1400px; margin: 0 auto; }
    .gallery-masonry img { width: 100%; margin-bottom: 8px; break-inside: avoid; }
    .gallery-footer { text-align: center; padding: 4rem 2rem; background: var(--ivory); }

    .gallery-footer a:hover { background: var(--peach); color: var(--white); }
    @media (max-width: 768px) { .gallery-masonry { column-count: 2; padding: 0 1rem 3rem; } .gallery-nav { padding: 1rem 1.5rem; } .gallery-hero { padding: 8rem 1.5rem 3rem; } }
