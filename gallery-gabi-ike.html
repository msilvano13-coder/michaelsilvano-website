  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --ivory: #faf8f5; --green: #2a3d28; --peach: #d4956b; --dark: #1a1a1a; --text: #4a4a4a; --text-light: #7a7a7a; --white: #ffffff; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Montserrat', sans-serif; color: var(--dark); background: var(--white); line-height: 1.8; font-weight: 300; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    .gallery-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 3rem; }
    .gallery-nav .back-link { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text); transition: color 0.3s; }
    .gallery-nav .back-link:hover { color: var(--peach); }
    .gallery-nav .nav-brand img { height: 35px; width: auto; mix-blend-mode: multiply; }
    .gallery-hero { padding: 10rem 3rem 5rem; text-align: center; background: var(--white); }
    .gallery-hero .eyebrow { font-size: 0.6rem; letter-spacing: 6px; text-transform: uppercase; color: var(--peach); margin-bottom: 1rem; }
    .gallery-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 400; font-style: italic; color: var(--dark); margin-bottom: 1rem; }
    .gallery-hero .venue { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text-light); margin-bottom: 1.5rem; }
    .gallery-hero .description { font-size: 0.95rem; color: var(--text); max-width: 600px; margin: 0 auto; line-height: 2; font-style: italic; }

    .gallery-collage {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 0 2rem 5rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery-collage img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .gallery-collage .item { overflow: hidden; }
    .gallery-collage .span-2c { grid-column: span 2; }
    .gallery-collage .span-2r { grid-row: span 2; }
    .gallery-collage .span-2x2 { grid-column: span 2; grid-row: span 2; }

    .gallery-footer { text-align: center; padding: 4rem 2rem; background: var(--ivory); }
    .gallery-footer p { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; color: var(--dark); margin-bottom: 1.5rem; }
    .gallery-footer a { display: inline-block; padding: 0.8rem 2.5rem; border: 1px solid var(--peach); color: var(--peach); font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; transition: all 0.3s; }
    .gallery-footer a:hover { background: var(--peach); color: var(--white); }
    @media (max-width: 768px) { .gallery-collage { grid-template-columns: repeat(3, 1fr); padding: 0 1rem 3rem; } .gallery-nav { padding: 1rem 1.5rem; } .gallery-hero { padding: 8rem 1.5rem 3rem; } }
    @media (max-width: 480px) { .gallery-collage { grid-template-columns: repeat(2, 1fr); } }
  </style>
